name: Update GitHub Metrics

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  workflow_dispatch: # Allow manual runs

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: ajaybe-ops
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/New_York
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          plugin_achievements_lock: yes
          plugin_languages: yes
          plugin_languages_aliases: yes
          plugin_languages_skipped: node_modules
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_limit: 4
          plugin_stars: yes
          plugin_stars_limit: 4
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_lines: yes
          plugin_traffic: yes
          plugin_followup: yes
          plugin_introduction: yes
          plugin_introduction_title: yes
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_notable: yes
          plugin_discussions: yes
          plugin_contributors: yes
          plugin_people: yes
          plugin_reactions: yes
          plugin_reactions_limit: 8

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add github-metrics.svg
          git diff --staged --quiet || (git commit -m "docs: update GitHub metrics [skip ci]" && git push)
